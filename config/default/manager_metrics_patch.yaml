apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  selector:
    matchLabels:
      control-plane: gitops-operator
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=:8443"
        - "--leader-elect"
        ports:
        - name: metrics
          containerPort: 8443
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
      volumes:
        # Secret created by the service CA operator.
        # We assume that the Kubernetes service exposing the application's pods has the
        # "service.beta.openshift.io/serving-cert-secret-name: kube-rbac-proxy-tls"
        # annotation.
        - name: kube-rbac-proxy-tls
          secret:
            secretName: kube-rbac-proxy-tls
